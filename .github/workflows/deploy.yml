name: Deploy to Hostinger

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run only (no changes made)'
        required: false
        default: 'false'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify build output exists
        run: |
          if [ ! -d dist ]; then
            echo "ERROR: dist/ does not exist - refusing to deploy"
            exit 1
          fi
          file_count=$(find dist -type f | wc -l)
          if [ "$file_count" -eq 0 ]; then
            echo "ERROR: dist/ is empty - refusing to deploy"
            exit 1
          fi
          echo "Build output looks good ($file_count files):"
          ls dist/ | head

      - name: Verify deploy path
        run: |
          if [ -z "${{ vars.DEPLOY_PATH }}" ]; then
            echo "ERROR: DEPLOY_PATH secret is empty"
            exit 1
          fi
          case "${{ vars.DEPLOY_PATH }}" in
            /home/*/domains/*/public_html) ;;
            *)
              echo "ERROR: DEPLOY_PATH must match /home/USER/domains/DOMAIN/public_html"
              echo "Got: ${{ vars.DEPLOY_PATH }}"
              exit 1
              ;;
          esac
          echo "Deploy path looks valid"

      - name: Setup SSH
        run: |
          mkdir -p ~/.s